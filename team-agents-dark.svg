<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <!-- Hex grid pattern — 4MC3D -->
    <pattern id="hexGrid" width="48.5" height="56" patternUnits="userSpaceOnUse">
      <path d="M24.25 0L48.5 14v28L24.25 56 0 42V14z" fill="none" stroke="#252629" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <!-- Noise -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.015"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.35} }
      @keyframes pulse2 { 0%,100%{opacity:.6} 50%{opacity:.2} }
      .p1 { animation: pulse 3s ease-in-out infinite; }
      .p2 { animation: pulse 3s ease-in-out 0.75s infinite; }
      .p3 { animation: pulse 3s ease-in-out 1.5s infinite; }
      .p4 { animation: pulse 3s ease-in-out 2.25s infinite; }
      .fl { animation: pulse2 4s ease-in-out infinite; }
      .fl2 { animation: pulse2 4s ease-in-out 1.3s infinite; }
    </style>
  </defs>

  <!-- Dark base — 4MC3D palette -->
  <rect width="700" height="500" fill="#1A1A1E"/>
  <rect width="700" height="500" fill="url(#hexGrid)"/>
  <rect width="700" height="500" filter="url(#noise)" opacity="0.5"/>
  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="60%">
    <stop offset="50%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
  </radialGradient>
  <rect width="700" height="500" fill="url(#vig)"/>

  <!-- Header -->
  <text x="350" y="38" text-anchor="middle" font-family="'Share Tech Mono', 'JetBrains Mono', monospace" font-size="9" letter-spacing="0.3em" fill="#505055">AUTONOMOUS DIGITAL AGENTS</text>

  <!-- Connection lines -->
  <line x1="228" y1="200" x2="310" y2="245" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="472" y1="200" x2="390" y2="245" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="228" y1="340" x2="310" y2="295" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="472" y1="340" x2="390" y2="295" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <!-- Flow dots -->
  <circle cx="268" cy="222" r="1.5" fill="rgba(255,255,255,0.06)" class="fl"/>
  <circle cx="432" cy="222" r="1.5" fill="rgba(255,255,255,0.06)" class="fl2"/>
  <circle cx="268" cy="318" r="1.5" fill="rgba(255,255,255,0.06)" class="fl2"/>
  <circle cx="432" cy="318" r="1.5" fill="rgba(255,255,255,0.06)" class="fl"/>

  <!-- ═══ CENTER HUB — brighter than surroundings, chamfered octagon ═══ -->
  <path d="M333,250 L367,250 Q388,254 388,264 L388,276 Q388,286 367,290 L333,290 Q312,286 312,276 L312,264 Q312,254 333,250Z"
           fill="rgba(42,42,46,0.8)" stroke="#505055" stroke-width="0.75"/>
  <!-- Inner glow -->
  <path d="M336,253 L364,253 Q384,257 384,265 L384,275 Q384,283 364,287 L336,287 Q316,283 316,275 L316,265 Q316,257 336,253Z"
           fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
  <text x="350" y="268" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" font-weight="400" fill="#707075">Your</text>
  <text x="350" y="283" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" font-weight="400" fill="#707075">Business</text>

  <!-- ═══ PERCEPTION — wide chamfered diamond ═══ -->
  <path d="M178,148 L234,157 Q248,162 246,185 L236,212 Q232,222 178,222 L122,212 Q110,208 111,185 L120,158 Q124,148 178,148Z"
           fill="rgba(42,42,46,0.8)" stroke="#505055" stroke-width="1"/>
  <path d="M178,158 L224,165 Q234,170 233,185 L226,204 Q222,212 178,212 L132,204 Q122,200 123,185 L130,166 Q134,158 178,158Z"
           fill="none" stroke="rgba(106,140,175,0.08)" stroke-width="0.5"/>
  <circle cx="128" cy="162" r="3" fill="rgba(106,140,175,0.6)" class="p1"/>
  <circle cx="128" cy="162" r="5.5" fill="none" stroke="rgba(106,140,175,0.15)" stroke-width="0.5" class="p1"/>
  <text x="178" y="181" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="400" fill="#B0B0B5">Perception</text>
  <text x="178" y="196" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#505055" letter-spacing="0.04em">triages · classifies · routes</text>

  <!-- ═══ COGNITION — crystalline hexagon ═══ -->
  <path d="M522,151 Q570,166 566,170 L566,200 Q566,208 522,219 Q478,208 478,200 L478,170 Q478,166 522,151Z"
           fill="rgba(42,42,46,0.8)" stroke="#505055" stroke-width="1"/>
  <path d="M522,159 Q558,170 556,174 L556,196 Q556,202 522,211 Q488,202 488,196 L488,174 Q488,170 522,159Z"
           fill="none" stroke="rgba(148,120,168,0.08)" stroke-width="0.5"/>
  <circle cx="484" cy="168" r="3" fill="rgba(148,120,168,0.6)" class="p2"/>
  <circle cx="484" cy="168" r="5.5" fill="none" stroke="rgba(148,120,168,0.15)" stroke-width="0.5" class="p2"/>
  <text x="522" y="184" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="400" fill="#B0B0B5">Cognition</text>
  <text x="522" y="199" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#505055" letter-spacing="0.04em">analyzes · correlates · reports</text>

  <!-- ═══ ACTION — forward chevron chamfer ═══ -->
  <path d="M142,322 L204,318 Q238,320 237,345 L228,372 Q224,383 206,383 L142,378 Q120,374 120,355 Q120,332 142,322Z"
           fill="rgba(42,42,46,0.8)" stroke="#505055" stroke-width="1"/>
  <path d="M147,329 L198,326 Q230,328 229,347 L222,368 Q218,377 200,377 L147,372 Q128,368 128,355 Q128,338 147,329Z"
           fill="none" stroke="rgba(107,124,94,0.08)" stroke-width="0.5"/>
  <circle cx="130" cy="332" r="3" fill="rgba(107,124,94,0.6)" class="p3"/>
  <circle cx="130" cy="332" r="5.5" fill="none" stroke="rgba(107,124,94,0.15)" stroke-width="0.5" class="p3"/>
  <text x="178" y="350" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="400" fill="#B0B0B5">Action</text>
  <text x="178" y="365" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#505055" letter-spacing="0.04em">drafts · executes · coordinates</text>

  <!-- ═══ SENTINEL — shield/badge chamfer ═══ -->
  <path d="M522,318 L561,330 Q570,334 568,360 L550,387 Q544,396 522,396 Q500,396 494,387 L476,360 Q474,334 483,330 L522,318Z"
           fill="rgba(42,42,46,0.8)" stroke="#505055" stroke-width="1"/>
  <path d="M522,326 L554,336 Q562,340 560,360 L546,382 Q540,390 522,390 Q504,390 498,382 L484,360 Q482,340 490,336 L522,326Z"
           fill="none" stroke="rgba(175,120,100,0.08)" stroke-width="0.5"/>
  <circle cx="486" cy="334" r="3" fill="rgba(175,120,100,0.55)" class="p4"/>
  <circle cx="486" cy="334" r="5.5" fill="none" stroke="rgba(175,120,100,0.15)" stroke-width="0.5" class="p4"/>
  <text x="522" y="357" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="400" fill="#B0B0B5">Sentinel</text>
  <text x="522" y="372" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#505055" letter-spacing="0.04em">audits · hardens · guards</text>

  <!-- Bottom -->
  <line x1="270" y1="445" x2="430" y2="445" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="350" y="466" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" font-weight="300" fill="rgba(255,255,255,0.5)">Personalized. Always-on. Yours.</text>
  <text x="350" y="484" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#404045" letter-spacing="0.04em">each learns your patterns, tools, and preferences</text>
</svg>