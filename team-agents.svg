<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <!-- Subtle glow for active indicators -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Warm gradient accent line -->
    <linearGradient id="warmLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B7C5E"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#2D2A26" flood-opacity="0.08"/>
    </filter>

    <!-- Pulse animation for active dots -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; r: 4; }
        50% { opacity: 0.6; r: 6; }
      }
      @keyframes softPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .pulse-dot { animation: pulse 2s ease-in-out infinite; }
      .pulse-dot-2 { animation: pulse 2s ease-in-out 0.7s infinite; }
      .pulse-dot-3 { animation: pulse 2s ease-in-out 1.4s infinite; }
      .data-flow { animation: softPulse 3s ease-in-out infinite; }
      .data-flow-2 { animation: softPulse 3s ease-in-out 1s infinite; }
      .data-flow-3 { animation: softPulse 3s ease-in-out 2s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="#FAFAF5"/>
  <rect width="900" height="540" filter="url(#noise)" opacity="0.3"/>

  <!-- Top accent line -->
  <rect x="380" y="35" width="140" height="2" rx="1" fill="url(#warmLine)"/>

  <!-- Title area -->
  <text x="450" y="72" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="15" font-weight="400" letter-spacing="0.12em" fill="#8B7355" text-transform="uppercase">ALWAYS-ON</text>

  <!-- Central hub — your business -->
  <rect x="350" y="200" width="200" height="130" rx="8" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="450" y="235" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="20" font-weight="600" fill="#2D2A26">Your Team</text>
  <line x1="415" y1="248" x2="485" y2="248" stroke="url(#warmLine)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Team member dots -->
  <circle cx="418" cy="275" r="12" fill="#F5F3EE" stroke="#E8E4DC" stroke-width="1"/>
  <circle cx="418" cy="275" r="5" fill="#A09A92"/>
  <circle cx="450" cy="275" r="12" fill="#F5F3EE" stroke="#E8E4DC" stroke-width="1"/>
  <circle cx="450" cy="275" r="5" fill="#A09A92"/>
  <circle cx="482" cy="275" r="12" fill="#F5F3EE" stroke="#E8E4DC" stroke-width="1"/>
  <circle cx="482" cy="275" r="5" fill="#A09A92"/>
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#A09A92" letter-spacing="0.08em">5 MEMBERS</text>

  <!-- Agent 1 — top left: Inbox Agent -->
  <rect x="60" y="95" width="180" height="110" rx="8" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="88" cy="125" r="4" fill="#6B7C5E" class="pulse-dot" filter="url(#glow)"/>
  <text x="100" y="129" font-size="12" font-weight="500" fill="#2D2A26">Inbox Agent</text>
  <text x="88" y="150" font-size="10" fill="#6B6560">Triages email, drafts</text>
  <text x="88" y="164" font-size="10" fill="#6B6560">responses, escalates</text>
  <text x="88" y="185" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A09A92">142 handled today</text>

  <!-- Agent 2 — top right: Data Agent -->
  <rect x="660" y="95" width="180" height="110" rx="8" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="688" cy="125" r="4" fill="#6B7C5E" class="pulse-dot-2" filter="url(#glow)"/>
  <text x="700" y="129" font-size="12" font-weight="500" fill="#2D2A26">Data Agent</text>
  <text x="688" y="150" font-size="10" fill="#6B6560">Syncs CRM, flags</text>
  <text x="688" y="164" font-size="10" fill="#6B6560">anomalies, reports</text>
  <text x="688" y="185" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A09A92">5.7M rows monitored</text>

  <!-- Agent 3 — bottom left: Security Agent -->
  <rect x="60" y="340" width="180" height="110" rx="8" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="88" cy="370" r="4" fill="#6B7C5E" class="pulse-dot-3" filter="url(#glow)"/>
  <text x="100" y="374" font-size="12" font-weight="500" fill="#2D2A26">Security Agent</text>
  <text x="88" y="395" font-size="10" fill="#6B6560">Scans configs, audits</text>
  <text x="88" y="409" font-size="10" fill="#6B6560">access, blocks threats</text>
  <text x="88" y="430" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A09A92">0 incidents · 24/7</text>

  <!-- Agent 4 — bottom right: Ops Agent -->
  <rect x="660" y="340" width="180" height="110" rx="8" fill="#FFFFFF" stroke="#E8E4DC" stroke-width="1" filter="url(#cardShadow)"/>
  <circle cx="688" cy="370" r="4" fill="#6B7C5E" class="pulse-dot" filter="url(#glow)"/>
  <text x="700" y="374" font-size="12" font-weight="500" fill="#2D2A26">Ops Agent</text>
  <text x="688" y="395" font-size="10" fill="#6B6560">Schedules, coordinates,</text>
  <text x="688" y="409" font-size="10" fill="#6B6560">tracks deliverables</text>
  <text x="688" y="430" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A09A92">23 tasks routed today</text>

  <!-- Connection lines — agents to hub -->
  <!-- Top left to center -->
  <path d="M240,155 C300,155 310,240 350,245" stroke="#E8E4DC" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <circle cx="295" cy="195" r="2.5" fill="#8B7355" class="data-flow"/>

  <!-- Top right to center -->
  <path d="M660,155 C600,155 590,240 550,245" stroke="#E8E4DC" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <circle cx="605" cy="195" r="2.5" fill="#8B7355" class="data-flow-2"/>

  <!-- Bottom left to center -->
  <path d="M240,390 C300,390 310,300 350,290" stroke="#E8E4DC" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <circle cx="295" cy="345" r="2.5" fill="#8B7355" class="data-flow-3"/>

  <!-- Bottom right to center -->
  <path d="M660,390 C600,390 590,300 550,290" stroke="#E8E4DC" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <circle cx="605" cy="345" r="2.5" fill="#8B7355" class="data-flow"/>

  <!-- Bottom text -->
  <text x="450" y="490" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="22" font-weight="500" fill="#2D2A26">Personalized. Always-on. Yours.</text>
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="#A09A92" letter-spacing="0.04em">Each agent learns your team's patterns, tools, and preferences</text>
</svg>