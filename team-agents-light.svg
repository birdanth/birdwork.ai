<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <pattern id="hexGrid" width="48.5" height="56" patternUnits="userSpaceOnUse">
      <path d="M24.25 0L48.5 14v28L24.25 56 0 42V14z" fill="none" stroke="rgba(0,0,0,0.025)" stroke-width="0.5"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.35} }
      @keyframes flow { 0%,100%{opacity:.5} 50%{opacity:.15} }
      .p1 { animation: pulse 3s ease-in-out infinite; }
      .p2 { animation: pulse 3s ease-in-out 0.75s infinite; }
      .p3 { animation: pulse 3s ease-in-out 1.5s infinite; }
      .p4 { animation: pulse 3s ease-in-out 2.25s infinite; }
      .fl { animation: flow 4s ease-in-out infinite; }
      .fl2 { animation: flow 4s ease-in-out 1.3s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="#FAFAF5"/>
  <rect width="700" height="500" fill="url(#hexGrid)"/>
  <rect width="700" height="500" filter="url(#grain)" opacity="0.4"/>

  <!-- Header -->
  <text x="350" y="36" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="0.3em" fill="rgba(0,0,0,0.2)">AUTONOMOUS DIGITAL AGENTS</text>

  <!-- Connection lines -->
  <line x1="232" y1="210" x2="312" y2="248" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="468" y1="210" x2="388" y2="248" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="232" y1="330" x2="312" y2="292" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="468" y1="330" x2="388" y2="292" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="272" cy="228" r="1.5" fill="rgba(0,0,0,0.08)" class="fl"/>
  <circle cx="428" cy="228" r="1.5" fill="rgba(0,0,0,0.08)" class="fl2"/>
  <circle cx="272" cy="312" r="1.5" fill="rgba(0,0,0,0.08)" class="fl2"/>
  <circle cx="428" cy="312" r="1.5" fill="rgba(0,0,0,0.08)" class="fl"/>

  <!-- ═══ CENTER — faint gray rounded octagon ═══ -->
  <path d="M326,248 L374,248 Q392,252 392,264 L392,276 Q392,288 374,292 L326,292 Q308,288 308,276 L308,264 Q308,252 326,248Z"
        fill="rgba(0,0,0,0.025)" stroke="rgba(0,0,0,0.06)" stroke-width="0.75"/>
  <text x="350" y="267" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" fill="rgba(0,0,0,0.3)">Your</text>
  <text x="350" y="282" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" fill="rgba(0,0,0,0.3)">Business</text>

  <!-- ═══ PERCEPTION — wide rounded diamond, DARK fill ═══ -->
  <g filter="url(#cardShadow)">
    <path d="M178,140 L244,152 Q258,158 256,185 L244,215 Q238,228 178,228 L112,215 Q98,208 100,185 L112,155 Q118,142 178,140Z"
          fill="#2D2A26" stroke="rgba(106,140,175,0.4)" stroke-width="1"/>
  </g>
  <circle cx="116" cy="156" r="3.5" fill="rgba(106,140,175,0.7)" class="p1"/>
  <circle cx="116" cy="156" r="6" fill="none" stroke="rgba(106,140,175,0.2)" stroke-width="0.5" class="p1"/>
  <text x="178" y="180" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="15" font-weight="400" fill="#EEEAE4">Perception</text>
  <text x="178" y="198" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(238,234,228,0.4)" letter-spacing="0.03em">triages · classifies · routes</text>

  <!-- ═══ COGNITION — rounded hexagon, DARK fill ═══ -->
  <g filter="url(#cardShadow)">
    <path d="M522,142 Q576,160 572,172 L572,204 Q572,216 522,228 Q472,216 472,204 L472,172 Q472,160 522,142Z"
          fill="#2D2A26" stroke="rgba(148,120,168,0.4)" stroke-width="1"/>
  </g>
  <circle cx="480" cy="164" r="3.5" fill="rgba(148,120,168,0.7)" class="p2"/>
  <circle cx="480" cy="164" r="6" fill="none" stroke="rgba(148,120,168,0.2)" stroke-width="0.5" class="p2"/>
  <text x="522" y="182" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="15" font-weight="400" fill="#EEEAE4">Cognition</text>
  <text x="522" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(238,234,228,0.4)" letter-spacing="0.03em">analyzes · correlates · reports</text>

  <!-- ═══ ACTION — forward chevron, DARK fill ═══ -->
  <g filter="url(#cardShadow)">
    <path d="M140,312 L210,306 Q246,310 244,340 L234,370 Q228,384 210,384 L140,378 Q116,372 116,350 Q116,322 140,312Z"
          fill="#2D2A26" stroke="rgba(107,124,94,0.4)" stroke-width="1"/>
  </g>
  <circle cx="126" cy="322" r="3.5" fill="rgba(107,124,94,0.7)" class="p3"/>
  <circle cx="126" cy="322" r="6" fill="none" stroke="rgba(107,124,94,0.2)" stroke-width="0.5" class="p3"/>
  <text x="178" y="344" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="15" font-weight="400" fill="#EEEAE4">Action</text>
  <text x="178" y="362" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(238,234,228,0.4)" letter-spacing="0.03em">drafts · executes · coordinates</text>

  <!-- ═══ SENTINEL — shield, DARK fill ═══ -->
  <g filter="url(#cardShadow)">
    <path d="M522,308 L568,322 Q578,328 576,358 L556,386 Q548,398 522,398 Q496,398 488,386 L468,358 Q466,328 476,322 L522,308Z"
          fill="#2D2A26" stroke="rgba(175,120,100,0.4)" stroke-width="1"/>
  </g>
  <circle cx="480" cy="326" r="3.5" fill="rgba(175,120,100,0.6)" class="p4"/>
  <circle cx="480" cy="326" r="6" fill="none" stroke="rgba(175,120,100,0.2)" stroke-width="0.5" class="p4"/>
  <text x="522" y="352" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="15" font-weight="400" fill="#EEEAE4">Sentinel</text>
  <text x="522" y="370" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(238,234,228,0.4)" letter-spacing="0.03em">audits · hardens · guards</text>

  <!-- Bottom -->
  <line x1="270" y1="445" x2="430" y2="445" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
  <text x="350" y="466" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" font-weight="300" fill="rgba(0,0,0,0.45)">Personalized. Always-on. Yours.</text>
  <text x="350" y="484" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="rgba(0,0,0,0.18)" letter-spacing="0.04em">each learns your patterns, tools, and preferences</text>
</svg>